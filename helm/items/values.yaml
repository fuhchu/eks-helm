replicaCount: 2

image:
  repository: ""   # filled in by CI
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8002

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

env:
  USERS_SERVICE_URL: "http://users:8001"
  # DATABASE_URL now comes from the items-db-credentials Secret (see
  # templates/secret.yaml), not from plaintext values here.

global:
  postgresPassword: ""   # must be supplied via --set global.postgresPassword=...
