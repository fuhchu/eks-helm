replicaCount: 2

image:
  repository: ""   # filled in by CI
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8002

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

env:
  USERS_SERVICE_URL: "http://users:8001"
  # DATABASE_URL comes from the items-db-credentials Secret, which External
  # Secrets Operator materializes from AWS Secrets Manager. See
  # templates/externalsecret.yaml.
