apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-items
  labels:
    app: items
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: items
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: items
        release: {{ .Release.Name }}
    spec:
      initContainers:
        - name: create-db
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              value: postgres
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -U postgres; do sleep 2; done
              psql -h postgres -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'itemsdb'" | grep -q 1 || \
                psql -h postgres -U postgres -c "CREATE DATABASE itemsdb;"
      containers:
        - name: items
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8002
          env:
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 20
