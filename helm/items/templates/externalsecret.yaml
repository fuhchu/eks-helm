# Produces the items-db-credentials Secret with a single DATABASE_URL key,
# sourced from the pre-built connection string in Secrets Manager.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: items-db-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: items-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: eks-helm/postgres
        property: items_database_url
