# A Secret is functionally like a ConfigMap — same API shape — but Kubernetes
# treats it differently: RBAC can restrict Secret access separately from other
# resources, and kubelet avoids writing Secret data to disk where possible.
# IMPORTANT: this is base64 ENCODING, not encryption. Anyone who can
# `kubectl get secret postgres-credentials -o yaml` and decode base64 can read
# the plaintext. Real confidentiality comes from RBAC + (optionally) KMS
# envelope encryption on the cluster, not from the Secret object itself.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
type: Opaque
stringData:
  # stringData (vs. `data`) lets us write plaintext here and Kubernetes
  # base64-encodes it for us — avoids us having to pre-encode values.
  POSTGRES_USER: {{ .Values.credentials.user | quote }}
  # global.postgresPassword is set once via --set at install time and shared
  # by every sub-chart (postgres, users, items) via Helm's "global" values
  # mechanism — one source of truth, never duplicated in values.yaml.
  POSTGRES_PASSWORD: {{ required "global.postgresPassword must be set via --set, e.g. helm upgrade ... --set global.postgresPassword=$PGPASS" .Values.global.postgresPassword | quote }}
