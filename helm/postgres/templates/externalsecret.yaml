# ESO reconciles this every refreshInterval: it reads eks-helm/postgres from
# Secrets Manager and creates/updates a native Kubernetes Secret named
# postgres-credentials with keys POSTGRES_USER / POSTGRES_PASSWORD.
# The StatefulSet's secretKeyRef references are unchanged — they neither know
# nor care that ESO (not a hand-written template) now produces this Secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: eks-helm/postgres     # the Secrets Manager secret name
        property: username          # JSON field within that secret
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: eks-helm/postgres
        property: password
