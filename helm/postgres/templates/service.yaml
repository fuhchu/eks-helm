# Headless Service — no ClusterIP, no load balancing.
# Required by StatefulSets: gives each pod a stable DNS name.
# The pod is reachable at: postgres-0.postgres.<namespace>.svc.cluster.local
# But our app just uses "postgres" which CoreDNS resolves to the pod IP directly.
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
