apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway
  annotations:
    # Tells the LB controller to use ALB (not NLB)
    kubernetes.io/ingress.class: alb
    # Internet-facing = public ALB in public subnets
    # internal = private ALB (for internal services only)
    alb.ingress.kubernetes.io/scheme: internet-facing
    # Route traffic to pod IPs directly (IP mode) rather than NodePort.
    # IP mode is more efficient — one hop fewer, no kube-proxy NAT on the node.
    alb.ingress.kubernetes.io/target-type: ip
    # ACM cert ARN — enables HTTPS listener on port 443
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.certificateArn }}
    # Redirect all HTTP traffic to HTTPS automatically
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: {{ .Values.service.port }}
