replicaCount: 2

image:
  repository: ""   # filled in by CI: <account>.dkr.ecr.<region>.amazonaws.com/eks-helm-api-gateway
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

env:
  USERS_SERVICE_URL: "http://users:8001"
  ITEMS_SERVICE_URL: "http://items:8002"

ingress:
  host: "eks-helm.fuhchu.org"
  certificateArn: "arn:aws:acm:us-west-2:445481011516:certificate/12451628-6977-4960-beb1-7ff3598d9208"
