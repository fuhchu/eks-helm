# Produces the users-db-credentials Secret with a single DATABASE_URL key.
# The full connection string (password embedded) was assembled in Terraform
# and stored in Secrets Manager, so ESO maps it 1:1 with no ESO-side
# templating -- which avoids ESO's Go-template syntax colliding with Helm's.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: users-db-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: users-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: eks-helm/postgres
        property: users_database_url
