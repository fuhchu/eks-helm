apiVersion: v1
kind: Service
metadata:
  name: users
  labels:
    app: users
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: users
    release: {{ .Release.Name }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
