# Constructs the full DATABASE_URL here, inside the cluster, from the shared
# global password — so the connection string (with embedded credentials)
# never appears in values.yaml, CI logs, or `kubectl get deployment -o yaml`.
# Only `kubectl get secret -o yaml` (base64-encoded) exposes it, which RBAC
# can restrict independently of other resources.
apiVersion: v1
kind: Secret
metadata:
  name: users-db-credentials
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:{{ required "global.postgresPassword must be set via --set" .Values.global.postgresPassword }}@postgres:5432/usersdb"
