replicaCount: 2

image:
  repository: ""   # filled in by CI
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8001

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

env: {}
  # DATABASE_URL comes from the users-db-credentials Secret, which External
  # Secrets Operator materializes from AWS Secrets Manager. See
  # templates/externalsecret.yaml.
