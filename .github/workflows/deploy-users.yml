name: Deploy users

on:
  push:
    branches: [master]
    paths:
      - "app/users/**"
      - "helm/users/**"
      - "helm/eks-app/**"

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: eks-helm-users
  SERVICE: users

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::445481011516:role/eks-helm-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG app/users/
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Install helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name eks-helm --region $AWS_REGION

      - name: Helm dependency build
        run: helm dependency build helm/eks-app/

      - name: Helm upgrade
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          helm upgrade eks-app helm/eks-app/ \
            --namespace eks-helm \
            --reuse-values \
            --set users.image.repository=$REGISTRY/$ECR_REPOSITORY \
            --set users.image.tag=$IMAGE_TAG \
            --wait \
            --timeout 5m
