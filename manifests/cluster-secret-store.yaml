# A ClusterSecretStore tells External Secrets Operator HOW and WHERE to fetch
# secrets. "Cluster" scope (vs. a namespaced SecretStore) means any namespace's
# ExternalSecret can reference it — convenient for a single shared backend.
#
# No `auth` block is specified: the AWS provider falls back to the ESO
# controller pod's own credentials, which come from the IRSA role annotation
# on the external-secrets ServiceAccount. That role is scoped to GetSecretValue
# on exactly the eks-helm/postgres secret.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-2
